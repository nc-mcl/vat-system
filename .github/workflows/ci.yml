name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
jobs:
  test:
    name: Build and Test
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: vatdb
          POSTGRES_USER: vat
          POSTGRES_PASSWORD: vat_test_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'gradle'
      - name: Fix gradlew permissions
        run: chmod +x gradlew
      - name: Build and test
        run: ./gradlew test --no-daemon --continue
        env:
          DB_HOST: localhost
          DB_PORT: 5432
          DB_NAME: vatdb
          DB_USER: vat
          DB_PASSWORD: vat_test_password
          SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/vatdb
          SPRING_DATASOURCE_USERNAME: vat
          SPRING_DATASOURCE_PASSWORD: vat_test_password
      - name: Publish test results
        uses: dorny/test-reporter@v2
        if: always()
        with:
          name: JUnit Tests
          path: '**/build/test-results/test/*.xml'
          reporter: java-junit
          fail-on-error: false
  build-image:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'gradle'
      - name: Fix gradlew permissions
        run: chmod +x gradlew
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: api/Dockerfile
          push: false
          tags: vat-system/api:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
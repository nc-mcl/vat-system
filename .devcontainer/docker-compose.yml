services:

  dev:
    image: eclipse-temurin:21-jdk-jammy
    volumes:
      - ..:/workspace:cached
      - gradle-cache:/root/.gradle
    working_dir: /workspace
    command: >
      bash -c "apt-get update -qq &&
               apt-get install -y -qq git curl unzip &&
               sed -i 's/DEFAULT_JVM_OPTS=.*$/DEFAULT_JVM_OPTS=\"-Xmx64m -Xms64m\"/' /workspace/gradlew &&
               sleep infinity"
    environment:
      - GRADLE_USER_HOME=/root/.gradle
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=vatdb
      - DB_USER=vat
      - DB_PASSWORD=vat_dev_password
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - vat-network

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: vatdb
      POSTGRES_USER: vat
      POSTGRES_PASSWORD: vat_dev_password
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vat -d vatdb"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - vat-network

  adminer:
    image: adminer:latest
    restart: unless-stopped
    ports:
      - "8090:8080"
    depends_on:
      - postgres
    networks:
      - vat-network

volumes:
  postgres-data:
  gradle-cache:

networks:
  vat-network:
    driver: bridge

apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: vat-api-hpa
  namespace: vat-system
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: vat-api
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70

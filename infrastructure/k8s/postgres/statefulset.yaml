apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgres
  namespace: vat-system
spec:
  serviceName: postgres
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      containers:
        - name: postgres
          image: postgres:16-alpine
          ports:
            - containerPort: 5432
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          env:
            - name: POSTGRES_DB
              value: vatdb
            - name: POSTGRES_USER
              value: vat
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: vat-secrets
                  key: db-password
          livenessProbe:
            exec:
              command: ["pg_isready", "-U", "vat", "-d", "vatdb"]
            initialDelaySeconds: 30
            periodSeconds: 10
          volumeMounts:
            - name: postgres-data
              mountPath: /var/lib/postgresql/data
  volumeClaimTemplates:
    - metadata:
        name: postgres-data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 10Gi

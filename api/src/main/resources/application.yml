spring:
  profiles:
    include: persistence
  application:
    name: vat-api
  threads:
    virtual:
      enabled: true          # Java 21 virtual threads for SKAT API I/O

server:
  port: ${PORT:8080}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      probes:
        enabled: true
      show-details: when-authorized

logging:
  level:
    com.netcompany.vat: INFO
    org.jooq.tools.LoggerListener: WARN

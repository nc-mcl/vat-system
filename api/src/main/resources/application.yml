spring:
  application:
    name: vat-system
  threads:
    virtual:
      enabled: true          # Java 21 virtual threads for SKAT API I/O
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/vatdb}
    username: ${DB_USER:vat_app}
    password: ${DB_PASSWORD:changeme}
    driver-class-name: org.postgresql.Driver
  flyway:
    enabled: true
    locations: classpath:db/migration
  jooq:
    sql-dialect: POSTGRES

server:
  port: ${SERVER_PORT:8080}

logging:
  level:
    com.netcompany.vat: INFO
    org.jooq.tools.LoggerListener: DEBUG  # log SQL in dev; set to WARN in production

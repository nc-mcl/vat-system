services:

  api:
    build:
      context: .
      dockerfile: api/Dockerfile
    ports:
      - "8080:8080"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/vatdb
      - SPRING_DATASOURCE_USERNAME=vat
      - SPRING_DATASOURCE_PASSWORD=vat_dev_password
      - SPRING_PROFILES_ACTIVE=local
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - vat-network

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: vatdb
      POSTGRES_USER: vat
      POSTGRES_PASSWORD: vat_dev_password
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./infrastructure/db/migrations:/docker-entrypoint-initdb.d:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vat -d vatdb"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - vat-network

  adminer:
    image: adminer:latest
    ports:
      - "8090:8080"
    depends_on:
      - postgres
    networks:
      - vat-network

volumes:
  postgres-data:

networks:
  vat-network:
    driver: bridge
